# Server Configuration
server.port=8080

# MySQL Database Configuration
# IMPORTANT: Change these credentials for production environments
# Recommended: Use environment variables (e.g., ${DB_URL}, ${DB_USERNAME}, ${DB_PASSWORD})
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# IMPORTANT: Use a secure, randomly generated secret in production
# Recommended: Use environment variables (e.g., ${JWT_SECRET})
# Generate a secure key: openssl rand -base64 64
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Application Configuration
app.name=E-Commerce Backend
app.version=1.0.0
